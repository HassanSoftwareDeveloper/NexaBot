services:
  - type: web
    name: nexabot-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: USER1_USERNAME
        sync: false
      - key: USER1_PASSWORD
        sync: false

  - type: web
    name: nexabot-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run Frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: USER1_USERNAME
        sync: false
      - key: USER1_PASSWORD
        sync: false
